services:

  db:
    image: postgres:16

    container_name: task_db

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: task_management

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


  app:
    build: .

    container_name: task_api

    restart: always

    depends_on:
      - db

    ports:
      - "8000:8000"

    env_file:
      - .env


volumes:
  postgres_data: